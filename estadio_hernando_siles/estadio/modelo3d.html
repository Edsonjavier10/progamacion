<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modelo 3D — Estadio Hernando Siles</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .mv-container {
      width: 100%;
      height: 100%;
      min-height: 70vh;
      position: relative;
    }
    .drop-zone {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      z-index: 5;
      pointer-events: none;
    }
    .drop-zone.hidden { display: none; }
    .file-input { display: none; }
    .upload-area {
      border: 2px dashed rgba(26,92,42,0.5);
      border-radius: 8px;
      padding: 3rem;
      cursor: pointer;
      pointer-events: all;
      transition: 0.3s ease;
    }
    .upload-area:hover {
      border-color: var(--verde-claro);
      background: rgba(26,92,42,0.06);
    }
    .upload-area.drag-over {
      border-color: var(--amarillo);
      background: rgba(245,197,24,0.06);
    }
    .cube-3d {
      width: 100px; height: 100px;
      margin: 0 auto 1.5rem;
      animation: cubeFloat 3s ease-in-out infinite;
    }
    @keyframes cubeFloat {
      0%,100% { transform: translateY(0) rotateY(0deg); }
      50%      { transform: translateY(-12px) rotateY(20deg); }
    }
    .preview-strip {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.75rem 1.5rem;
      background: rgba(8,12,16,0.85);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      z-index: 10;
    }
    .preview-strip-center { display: flex; gap: 2rem; }
    .preview-stat { text-align: center; }
    .preview-stat strong {
      display: block;
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--amarillo);
    }
    /* El canvas Three.js ocupa todo el contenedor */
    #threeContainer {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, #12311e 0%, #060b10 65%, #020406 100%);
      display: none; /* se muestra cuando el modelo carga */
    }
    #threeContainer canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
 
  <!-- ===== NAVEGACIÓN ===== -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">⚽</div>
        <span class="nav-logo-text">HERNANDO <span>SILES</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="historia.html">Historia</a></li>
        <li><a href="modelo3d.html" class="active">Modelo 3D</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Menú">☰</button>
    </div>
  </nav>
 
  <!-- ===== VISOR ===== -->
  <div class="viewer-layout">
    <div class="viewer-main">
      <div class="viewer-grid-bg"></div>
      
 
      <div class="mv-container" id="mvContainer">
 
        <!-- Zona de carga / drag & drop -->
        <div class="drop-zone" id="dropZone">
          <div class="upload-area" id="uploadArea">
            <div class="cube-3d">
              <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;">
                <polygon points="50,10 90,30 50,50 10,30" fill="#1a5c2a" stroke="#2a8040" stroke-width="1"/>
                <polygon points="90,30 90,70 50,90 50,50" fill="#0d3d1a" stroke="#2a8040" stroke-width="1"/>
                <polygon points="10,30 50,50 50,90 10,70" fill="#143322" stroke="#2a8040" stroke-width="1"/>
                <line x1="50" y1="10" x2="50" y2="50" stroke="#2a8040" stroke-width="0.5"/>
                <ellipse cx="50" cy="30" rx="8" ry="5" fill="none" stroke="#2a8040" stroke-width="0.5"/>
              </svg>
            </div>
            <h2 style="font-family:var(--font-display);font-size:1.8rem;color:var(--blanco);letter-spacing:0.05em;margin-bottom:0.5rem;">
              CARGAR MODELO
            </h2>
            <p style="font-size:0.82rem;color:rgba(255,255,255,0.4);line-height:1.7;max-width:300px;margin:0 auto 1.5rem;">
              Arrastra tu archivo <strong style="color:var(--verde-claro)">estadio.glb</strong> aquí,
              o haz clic para seleccionarlo desde tu computadora.
            </p>
            <label for="glbInput" class="upload-btn">
              📂 Seleccionar archivo .glb
            </label>
            <input type="file" id="glbInput" class="file-input" accept=".glb,.gltf" />
            <p style="margin-top:1rem;font-size:0.7rem;color:rgba(255,255,255,0.2);">
              Formatos soportados: .glb / .gltf
            </p>
          </div>
        </div>
 
        <!-- Canvas Three.js -->
        <div id="threeContainer"></div>
 
        <!-- Controles flotantes -->
        <div class="viewer-controls" id="viewerControls" style="display:none;">
          <button class="ctrl-btn" title="Reiniciar cámara" onclick="resetCamera()">⟳</button>
          <button class="ctrl-btn" title="Auto-rotar"       onclick="toggleAutoRotate()" id="rotateBtn">⏸</button>
          <button class="ctrl-btn" title="Pantalla completa" onclick="toggleFullscreen()">⤢</button>
        </div>
 
        
      </div>
    </div>
  </div>
 
  <script src="js/main.js"></script>
 
  <!-- Import map: resuelve 'three' a la URL del CDN -->
  <script type="importmap">
  {
    "imports": {
      "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
 
  <script type="module">
    import * as THREE               from 'three';
    import { GLTFLoader }           from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls }        from 'three/addons/controls/OrbitControls.js';
 
    /* ── Referencias DOM ── */
    const dropZone      = document.getElementById('dropZone');
    const uploadArea    = document.getElementById('uploadArea');
    const glbInput      = document.getElementById('glbInput');
    const threeContainer= document.getElementById('threeContainer');
    const controlsPanel = document.getElementById('viewerControls');
    const strip         = document.getElementById('previewStrip');
    const fileSizeEl    = document.getElementById('fileSize');
 
    /* ── Ruta por defecto (relativa al HTML) ── */
    const defaultModelPath = '../../modelos/hernando_siles.glb';
 
    /* ── Estado ── */
    let scene, camera, renderer, orbitControls, modelGroup;
    let autoRotating       = true;
    let autoLoadAttempted  = false;
 
    /* ════════════════════════════════════════
       INICIALIZAR THREE.JS
    ════════════════════════════════════════ */
    function initViewer() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a1628); // azul noche

  camera = new THREE.PerspectiveCamera(45, 16 / 9, 0.1, 5000);
  camera.position.set(0, 8, 16);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(threeContainer.offsetWidth || window.innerWidth,
                   threeContainer.offsetHeight || window.innerHeight * 0.7);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
  renderer.toneMapping       = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.4;
  threeContainer.appendChild(renderer.domElement);

  /* ── LUCES FUERTES ── */
  // Ambiente general — ilumina todo sin sombras
  const ambientLight = new THREE.AmbientLight(0xffffff,1);
  scene.add(ambientLight);

  // Sol principal desde arriba
  const sunLight = new THREE.DirectionalLight(0xfff5e0, 5.0);
  sunLight.position.set(80, 150, 80);
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.set(4096, 4096);
  sunLight.shadow.camera.near   =   1;
  sunLight.shadow.camera.far    = 1000;
  sunLight.shadow.camera.left   = -200;
  sunLight.shadow.camera.right  =  200;
  sunLight.shadow.camera.top    =  200;
  sunLight.shadow.camera.bottom = -200;
  sunLight.shadow.bias = -0.001;
  scene.add(sunLight);

  // Relleno desde el lado opuesto

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(800, 800),
  new THREE.MeshStandardMaterial({ color: 0x8B7355  }));
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  floor.position.y = -2.2; // ligeramente bajo para no tapar el modelo
  scene.add(floor);

  /* ── OrbitControls ── */
  orbitControls = new OrbitControls(camera, renderer.domElement);
  orbitControls.enableDamping   = true;
  orbitControls.dampingFactor   = 0.08;
  orbitControls.target.set(0, 3, 0);
  orbitControls.minDistance     = 4;
  orbitControls.maxDistance     = 800;
  orbitControls.enablePan       = true;
  orbitControls.autoRotate      = true;
  orbitControls.autoRotateSpeed = 0.6;

  window.addEventListener('resize', onResize);
  animate();
  loadModel(defaultModelPath);
}
 
    /* ════════════════════════════════════════
       LOOP DE ANIMACIÓN
    ════════════════════════════════════════ */
    function animate() {
      requestAnimationFrame(animate);
      orbitControls.update();
      renderer.render(scene, camera);
    }
 
    /* ════════════════════════════════════════
       RESIZE
    ════════════════════════════════════════ */
    function onResize() {
      if (!threeContainer.offsetWidth) return;
      camera.aspect = threeContainer.offsetWidth / threeContainer.offsetHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(threeContainer.offsetWidth, threeContainer.offsetHeight);
    }
 
    /* ════════════════════════════════════════
       MOSTRAR / OCULTAR ESTADOS
    ════════════════════════════════════════ */
    function showViewerState(loaded) {
      /* Drop zone */
      if (dropZone) dropZone.style.display = loaded ? 'none' : 'flex';
 
      /* Canvas Three.js */
      if (threeContainer) {
        threeContainer.style.display = loaded ? 'block' : 'none';
      }
 
      /* Controles y barra */
      if (controlsPanel) controlsPanel.style.display = loaded ? 'flex' : 'none';
      if (strip)          strip.style.display         = loaded ? 'flex' : 'none';
 
      /* Si acabamos de mostrar el canvas, sincronizar tamaño del renderer */
      if (loaded) {
        setTimeout(onResize, 60);
      }
    }
 
    /* ════════════════════════════════════════
       CARGAR MODELO GLB
    ════════════════════════════════════════ */
    function loadModel(source) {
      const isPath  = typeof source === 'string';
      const url     = isPath ? source : URL.createObjectURL(source);
 
      /* Actualizar tamaño en la barra inferior */
      if (fileSizeEl) {
        fileSizeEl.textContent = isPath ? 'Cargando…' :
          source.size > 1024 * 1024
            ? (source.size / (1024 * 1024)).toFixed(2) + ' MB'
            : (source.size / 1024).toFixed(0) + ' KB';
      }
 
      const loader = new GLTFLoader();
 
      loader.load(
        url,
 
        /* ── onLoad ── */
        (gltf) => {
          if (modelGroup) scene.remove(modelGroup);
          modelGroup = gltf.scene;
 
          /* Activar sombras en todos los meshes */
          modelGroup.traverse(child => {
            if (child.isMesh) {
              child.castShadow    = false;
              child.receiveShadow = false;
            }
          });
 
          scene.add(modelGroup);
 
          /* Centrar modelo y ajustar cámara automáticamente */
          const box    = new THREE.Box3().setFromObject(modelGroup);
          const center = box.getCenter(new THREE.Vector3());
          const size   = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
 
          orbitControls.target.copy(center);
 
          camera.position.set(
            center.x + maxDim * 0.9,
            center.y + maxDim * 0.55,
            center.z + maxDim * 0.9
          );
          camera.far = maxDim * 20;
          camera.updateProjectionMatrix();
 
          orbitControls.minDistance = maxDim * 0.1;
          orbitControls.maxDistance = maxDim * 5;
          orbitControls.update();
 
          showViewerState(true);
          console.log('✅ Modelo cargado — tamaño:', size, '| maxDim:', maxDim.toFixed(1));
 
          /* Liberar ObjectURL si vino de un File */
          if (!isPath) URL.revokeObjectURL(url);
        },
 
        /* ── onProgress ── */
        (xhr) => {
          if (xhr.total && fileSizeEl) {
            const pct = Math.round((xhr.loaded / xhr.total) * 100);
            fileSizeEl.textContent = pct + '%';
          }
        },
 
        /* ── onError ── */
        (error) => {
          console.error('❌ Error al cargar el modelo:', error);
          if (fileSizeEl) fileSizeEl.textContent = 'Error';
          showViewerState(false);
          if (!isPath) URL.revokeObjectURL(url);
        }
      );
    }
 
    /* ════════════════════════════════════════
       BOTONES DE CONTROL
    ════════════════════════════════════════ */
    function fitCameraToModel(object) {
      const box    = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size   = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const fov    = camera.fov * (Math.PI / 180);
      const dist   = (maxDim / (2 * Math.tan(fov / 2))) * 1.5;
 
      camera.position.set(center.x + dist, center.y + dist * 0.45, center.z + dist);
      orbitControls.target.copy(center);
      orbitControls.update();
    }
 
    window.resetCamera = () => {
      if (modelGroup) fitCameraToModel(modelGroup);
    };
 
    window.toggleAutoRotate = () => {
      autoRotating = !autoRotating;
      orbitControls.autoRotate = autoRotating;
      const btn = document.getElementById('rotateBtn');
      if (btn) btn.textContent = autoRotating ? '⏸' : '▶';
    };
 
    window.toggleFullscreen = () => {
      const container = document.querySelector('.viewer-main');
      if (!container) return;
      if (!document.fullscreenElement) {
        container.requestFullscreen().catch(console.error);
      } else {
        document.exitFullscreen();
      }
    };
 
    /* ════════════════════════════════════════
       INPUT DE ARCHIVO
    ════════════════════════════════════════ */
    if (glbInput) {
      glbInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadModel(file);
      });
    }
 
    /* ════════════════════════════════════════
       DRAG & DROP
    ════════════════════════════════════════ */
    const mv = document.getElementById('mvContainer');
    if (mv) {
      mv.addEventListener('dragover',  (e) => { e.preventDefault(); uploadArea?.classList.add('drag-over'); });
      mv.addEventListener('dragleave', ()  => { uploadArea?.classList.remove('drag-over'); });
      mv.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea?.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && /\.(glb|gltf)$/i.test(file.name)) loadModel(file);
      });
    }
 
    /* ── Arrancar ── */
    initViewer();
  </script>
</body>
</html>
