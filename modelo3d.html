<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modelo 3D — Estadio Hernando Siles</title>

  <!-- Three.js + GLTFLoader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <style>
    :root {
      --negro: #0a0a0a;
      --gris-oscuro: #141414;
      --gris: #222;
      --blanco: #ffffff;
      --amarillo: #fcc700;
      --rojo: #c0272d;
      --verde-claro: #4ade80;
      --font-display: 'Arial Black', 'Arial', sans-serif;
      --font-body: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--negro);
      color: var(--blanco);
      overflow-x: hidden;
    }

    /* ===== NAV ===== */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(10,10,10,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0.9rem 0;
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0.75rem;
      text-decoration: none; font-weight: 700; font-size: 0.9rem;
      letter-spacing: 0.1em; color: var(--blanco); transition: 0.3s;
    }
    .nav-logo:hover { color: var(--amarillo); }
    .nav-logo-icon { font-size: 1.4rem; }
    .nav-logo-text span { color: var(--amarillo); }
    .nav-links { display: flex; list-style: none; gap: 2rem; }
    .nav-links a {
      text-decoration: none; color: rgba(255,255,255,0.65);
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em;
      transition: 0.3s; position: relative;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--amarillo); }
    .nav-links a.active::after {
      content: ''; position: absolute; bottom: -8px; left: 0; right: 0;
      height: 2px; background: var(--amarillo);
    }
    .nav-toggle { display: none; background: none; border: none; color: var(--blanco); font-size: 1.5rem; cursor: pointer; }

    /* ===== HERO HEADER ===== */
    .model-header {
      padding: 7rem 2rem 3rem;
      background: linear-gradient(180deg, #0d0d0d 0%, var(--negro) 100%);
      text-align: center;
      border-bottom: 1px solid rgba(255,199,0,0.15);
      position: relative;
      overflow: hidden;
    }
    .model-header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(192,39,45,0.12) 0%, transparent 65%);
    }
    .model-header-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.2em; color: var(--amarillo);
      text-transform: uppercase; margin-bottom: 0.75rem; display: block;
    }
    .model-header h1 {
      font-family: var(--font-display); font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 900; letter-spacing: -0.02em; line-height: 1;
      margin-bottom: 1rem;
    }
    .model-header h1 span { color: var(--amarillo); }
    .model-header p {
      color: rgba(255,255,255,0.5); font-size: 0.95rem; max-width: 500px; margin: 0 auto;
    }
    .header-badges {
      display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap;
    }
    .hbadge {
      padding: 0.35rem 0.9rem; border-radius: 20px; font-size: 0.7rem;
      font-weight: 700; letter-spacing: 0.08em;
    }
    .hbadge.green { background: rgba(74,222,128,0.12); color: var(--verde-claro); border: 1px solid rgba(74,222,128,0.25); }
    .hbadge.yellow { background: rgba(252,199,0,0.1); color: var(--amarillo); border: 1px solid rgba(252,199,0,0.2); }
    .hbadge.red { background: rgba(192,39,45,0.12); color: #f87171; border: 1px solid rgba(192,39,45,0.25); }

    /* ===== VISOR 3D ===== */
    .viewer-wrap {
      position: relative;
      height: 75vh; min-height: 500px;
      background: #060a0e;
    }
    #threeCanvas {
      display: block; width: 100%; height: 100%;
    }

    /* Loading overlay */
    #loadingOverlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #060a0e; z-index: 10;
      transition: opacity 0.6s ease;
    }
    #loadingOverlay.hidden { opacity: 0; pointer-events: none; }
    .loading-icon {
      font-size: 4rem; margin-bottom: 1.5rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:0.7} }
    .loading-bar-track {
      width: 220px; height: 3px; background: rgba(255,255,255,0.08);
      border-radius: 3px; overflow: hidden; margin: 1rem 0;
    }
    .loading-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--rojo), var(--amarillo));
      transition: width 0.3s ease; border-radius: 3px;
    }
    .loading-text {
      font-size: 0.75rem; color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .loading-pct {
      font-family: var(--font-display); font-size: 1.5rem;
      color: var(--amarillo); margin-bottom: 0.25rem;
    }

    /* HUD Badges sobre el canvas */
    .viewer-hud {
      position: absolute; top: 1rem; right: 1rem; z-index: 5;
      display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end;
    }
    .hud-badge {
      background: rgba(6,10,14,0.85); backdrop-filter: blur(6px);
      border: 1px solid rgba(252,199,0,0.25); color: var(--amarillo);
      padding: 0.4rem 0.85rem; border-radius: 20px;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
    }
    .hud-badge.live::before {
      content: '● '; color: var(--verde-claro);
    }

    /* Controles flotantes */
    .viewer-controls {
      position: absolute; bottom: 1.25rem; left: 1.25rem; z-index: 5;
      display: flex; gap: 0.5rem;
    }
    .ctrl-btn {
      width: 42px; height: 42px;
      background: rgba(20,20,20,0.85); backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
      color: var(--blanco); cursor: pointer; font-size: 1rem;
      transition: 0.25s ease; display: flex; align-items: center; justify-content: center;
    }
    .ctrl-btn:hover { background: var(--amarillo); color: var(--negro); border-color: var(--amarillo); }

    /* Hint inferior */
    .viewer-hint {
      position: absolute; bottom: 1.25rem; right: 1.25rem; z-index: 5;
      font-size: 0.68rem; color: rgba(255,255,255,0.3);
      background: rgba(6,10,14,0.7); padding: 0.4rem 0.9rem;
      border-radius: 20px; backdrop-filter: blur(4px);
    }

    /* ===== STATS ROW ===== */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid rgba(255,255,255,0.06);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat-col {
      padding: 2rem 1.5rem; text-align: center;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .stat-col:last-child { border-right: none; }
    .stat-col-val {
      font-family: var(--font-display); font-size: 2.2rem;
      font-weight: 900; color: var(--amarillo); margin-bottom: 0.25rem;
    }
    .stat-col-label { font-size: 0.72rem; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; text-transform: uppercase; }

    /* ===== INFO CARDS ===== */
    .info-section {
      padding: 4rem 2rem;
      background: var(--gris-oscuro);
    }
    .info-grid {
      max-width: 1000px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
    }
    .info-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 6px; padding: 1.75rem;
      transition: 0.3s ease; position: relative; overflow: hidden;
    }
    .info-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
    }
    .info-card.yellow::before { background: var(--amarillo); }
    .info-card.green::before { background: var(--verde-claro); }
    .info-card.red::before { background: var(--rojo); }
    .info-card:hover { transform: translateY(-4px); border-color: rgba(255,199,0,0.2); }
    .info-card-icon { font-size: 2rem; margin-bottom: 1rem; }
    .info-card h3 {
      font-family: var(--font-display); font-size: 0.95rem;
      letter-spacing: 0.05em; margin-bottom: 0.75rem; text-transform: uppercase;
    }
    .info-card p { font-size: 0.83rem; color: rgba(255,255,255,0.55); line-height: 1.7; }

    /* ===== COMPONENTES ===== */
    .comp-section { padding: 4rem 2rem; background: var(--negro); }
    .comp-inner { max-width: 800px; margin: 0 auto; }
    .comp-title {
      text-align: center; margin-bottom: 2.5rem;
    }
    .comp-title span { color: var(--amarillo); }
    .comp-eyebrow {
      font-size: 0.7rem; letter-spacing: 0.18em; color: var(--amarillo);
      text-transform: uppercase; display: block; margin-bottom: 0.5rem;
    }
    .comp-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .comp-item {
      display: flex; align-items: center; gap: 1rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px; padding: 1rem 1.25rem;
    }
    .comp-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .comp-dot.done { background: var(--verde-claro); box-shadow: 0 0 8px rgba(74,222,128,0.5); }
    .comp-dot.wip { background: var(--amarillo); box-shadow: 0 0 8px rgba(252,199,0,0.5); }
    .comp-name { flex: 1; font-size: 0.88rem; font-weight: 600; }
    .comp-bar-wrap { width: 120px; }
    .comp-bar-track { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
    .comp-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease; width: 0%; }
    .comp-bar-fill.done { background: var(--verde-claro); }
    .comp-bar-fill.wip { background: var(--amarillo); }
    .comp-pct { font-size: 0.75rem; font-weight: 700; color: var(--amarillo); min-width: 36px; text-align: right; }

    /* ===== NAV BUTTONS ===== */
    .nav-btns {
      padding: 4rem 2rem; background: var(--gris-oscuro); text-align: center;
    }
    .btn-row { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 1rem 2rem; border-radius: 4px; font-size: 0.82rem;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      text-decoration: none; transition: 0.3s ease; cursor: pointer;
    }
    .btn-ghost {
      background: var(--gris); border: 1px solid rgba(255,255,255,0.1); color: var(--blanco);
    }
    .btn-ghost:hover { border-color: var(--amarillo); color: var(--amarillo); }
    .btn-primary { background: var(--rojo); border: 1px solid var(--rojo); color: var(--blanco); box-shadow: 0 4px 20px rgba(192,39,45,0.35); }
    .btn-primary:hover { background: #a01f24; }

    /* ===== FOOTER ===== */
    .footer {
      padding: 3rem 2rem; background: var(--gris-oscuro);
      border-top: 3px solid var(--rojo); text-align: center; position: relative;
    }
    .footer-stripe {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--rojo), var(--amarillo), var(--rojo));
    }
    .footer-title { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 0.5rem; font-family: var(--font-display); }
    .footer-title span { color: var(--amarillo); }
    .footer-sub { font-size: 0.75rem; color: rgba(255,255,255,0.4); letter-spacing: 0.08em; margin-bottom: 1.5rem; }
    .footer-copy { font-size: 0.7rem; color: rgba(255,255,255,0.25); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .nav-links { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; right: 0; background: rgba(10,10,10,0.98); padding: 1rem 2rem; gap: 1rem; }
      .nav-links.open { display: flex; }
      .nav-toggle { display: block; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .info-grid { grid-template-columns: 1fr; }
      .viewer-wrap { height: 55vh; }
    }
  </style>
</head>

<body>
 
  <!-- ===== NAV ===== -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">⚽</div>
        <span class="nav-logo-text">HERNANDO <span>SILES</span></span>
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="historia.html">Historia</a></li>
        <li><a href="modelo3d.html" class="active">Modelo 3D</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Menú">☰</button>
    </div>
  </nav>
 
  <!-- ===== HEADER PEQUEÑO ===== -->
  <header class="model-header">
   
    <h1>HERNANDO <span>SILES</span></h1>
    
  </header>
 
  <!-- ===== VISOR 3D ===== -->
  <div class="viewer-wrap">
    <canvas id="threeCanvas"></canvas>
 
    <div id="loadingOverlay">
      <div class="loading-icon">🏟️</div>
      <div class="loading-pct" id="loadPct">0%</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loadBar"></div>
      </div>
      <div class="loading-text">Cargando modelo 3D…</div>
    </div>
 
    <div class="viewer-hud">
      <div class="hud-badge live">LIVE 3D VIEWER</div>
      <div class="hud-badge">Three.js r128</div>
    </div>
 
    <div class="viewer-controls">
      <button class="ctrl-btn" title="Reiniciar cámara" onclick="resetCamera()">⟳</button>
      <button class="ctrl-btn" title="Auto-rotar" onclick="toggleRotate()" id="rotateBtn">⏸</button>
      <button class="ctrl-btn" title="Pantalla completa" onclick="toggleFS()">⤢</button>
    </div>
 
    <div class="viewer-hint">Arrastra · Scroll · Doble clic para rotar</div>
  </div>
 
  <!-- ===== EXPLORAR MÁS ===== -->
  <div class="nav-btns">
    <span class="nav-btns-eyebrow">Explorar más</span>
    <div class="btn-row">
      <a href="index.html" class="btn btn-ghost">← Inicio</a>
      <a href="historia.html" class="btn btn-primary">Ver Historia →</a>
    </div>
  </div>
 
  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="footer-stripe"></div>
    <div class="footer-title">HERNANDO <span>SILES</span></div>
    
  <script src="js/main.js"></script>
 
  <script>
    // ── NAV MÓVIL ──
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navLinks').classList.toggle('open');
    });
 
    // ── THREE.JS SETUP ──
    const canvas = document.getElementById('threeCanvas');
    const wrap   = canvas.parentElement;
 
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a1628);
 
    const camera = new THREE.PerspectiveCamera(45, wrap.clientWidth / wrap.clientHeight, 0.1, 5000);
    camera.position.set(12, 8, 18);
 
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
    renderer.shadowMap.enabled   = false;
    renderer.outputEncoding      = THREE.sRGBEncoding;
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.6;
 
    // ── CONTROLES ──
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping    = true;
    controls.dampingFactor    = 0.07;
    controls.minDistance      = 3;
    controls.maxDistance      = 800;
    controls.maxPolarAngle    = Math.PI / 1.8;
    controls.autoRotate       = true;
    controls.autoRotateSpeed  = 0.8;
 
    // ── LUCES ──
    // Ambiente base
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
 
    // Sol principal
    const sunLight = new THREE.DirectionalLight(0xfff5e0, 1);
    sunLight.position.set(80, 150, 80);
    sunLight.castShadow = false;
    scene.add(sunLight);
 
    // Relleno lateral
    const fillLight = new THREE.DirectionalLight(0xaaccff, 1.2);
    fillLight.position.set(-80, 60, -80);
    scene.add(fillLight);
 
    // Desde abajo — ilumina interior cancha
    const bottomLight = new THREE.DirectionalLight(0xffffff, 0.1);
    bottomLight.position.set(0, -100, 0);
    scene.add(bottomLight);
 
    // Acento rojo fachada
    const redSpot = new THREE.PointLight(0xc0272d, 2.5, 60, 2);
    redSpot.position.set(-8, 5, 10);
    scene.add(redSpot);
 
    // Acento amarillo
    const yellowSpot = new THREE.PointLight(0xfcc700, 1.8, 50, 2);
    yellowSpot.position.set(8, 6, -8);
    scene.add(yellowSpot);
 
    // ── SUELO ──
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(800, 800),
      new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.9, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2.2;
    scene.add(ground);
 
    // ── CARGAR GLB ──
    const loader     = document.getElementById ? new THREE.GLTFLoader() : null;
    const loadOverlay = document.getElementById('loadingOverlay');
    const loadBar    = document.getElementById('loadBar');
    const loadPct    = document.getElementById('loadPct');
 
    const gltfLoader = new THREE.GLTFLoader();
 
    gltfLoader.load(
      'modelos/hernando_siles.glb',
 
      // onLoad
      (gltf) => {
        const model = gltf.scene;
 
        // Centrar y escalar al tamaño de la escena
        const box    = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 10 / maxDim;
 
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        model.position.y = 0;
 
        // Materiales — doble cara + sin sombras
        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow    = false;
            child.receiveShadow = false;
            if (child.material) {
              child.material.side        = THREE.DoubleSide;
              child.material.needsUpdate = true;
            }
          }
        });
 
        scene.add(model);
 
        // Ajustar cámara
        const scaledMax = maxDim * scale;
        camera.position.set(scaledMax * 1.3, scaledMax * 0.9, scaledMax * 1.5);
        controls.target.set(0, 0, 0);
        controls.update();
 
        // Ocultar loading
        loadOverlay.classList.add('hidden');
      },
 
      // onProgress
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          loadBar.style.width  = pct + '%';
          loadPct.textContent  = pct + '%';
        }
      },
 
      // onError
      (error) => {
        console.error('❌ Error al cargar GLB:', error);
        loadOverlay.classList.add('hidden');
      }
    );
 
    // ── ANIMACIÓN ──
    let autoRot = true;
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      // Luces pulsantes leves
      const t = Date.now() * 0.001;
      redSpot.intensity    = 2.2 + Math.sin(t * 0.8) * 0.4;
      yellowSpot.intensity = 1.6 + Math.cos(t * 0.6) * 0.3;
      renderer.render(scene, camera);
    }
    animate();
 
    // ── RESIZE ──
    const resizeObs = new ResizeObserver(() => {
      const w = wrap.clientWidth, h = wrap.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });
    resizeObs.observe(wrap);
 
    // ── BOTONES ──
    function resetCamera() {
      camera.position.set(12, 8, 18);
      controls.target.set(0, 0, 0);
      controls.update();
    }
    function toggleRotate() {
      autoRot = !autoRot;
      controls.autoRotate = autoRot;
      document.getElementById('rotateBtn').textContent = autoRot ? '⏸' : '▶';
    }
    function toggleFS() {
      if (!document.fullscreenElement) {
        wrap.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    }
  </script>
</body>
